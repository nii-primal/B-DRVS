# =============================================================================
# B-DRVS — Docker Compose: Hyperledger Fabric Network
# Services: orderer | peer0.moh | peer0.nita | cli (admin shell)
# Fabric version: 2.5.x  (LTS)
# =============================================================================

version: '3.7'

volumes:
  orderer.bdrvs.gh:
  peer0.moh.bdrvs.gh:
  peer0.nita.bdrvs.gh:

networks:
  bdrvs_net:
    name: bdrvs_net

services:

  # ── Orderer ──────────────────────────────────────────────────────────────────
  orderer.bdrvs.gh:
    container_name: orderer.bdrvs.gh
    image: hyperledger/fabric-orderer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # Genesis / Bootstrap
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      # TLS
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.bdrvs.gh:9443
    working_dir: /root
    command: orderer
    volumes:
      - ../crypto-material/ordererOrganizations/bdrvs.gh/orderers/orderer.bdrvs.gh/msp:/var/hyperledger/orderer/msp
      - ../crypto-material/ordererOrganizations/bdrvs.gh/orderers/orderer.bdrvs.gh/tls:/var/hyperledger/orderer/tls
      - ../channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - orderer.bdrvs.gh:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    networks:
      - bdrvs_net

  # ── MoH Peer ─────────────────────────────────────────────────────────────────
  peer0.moh.bdrvs.gh:
    container_name: peer0.moh.bdrvs.gh
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      #- FABRIC_LOGGING_SPEC=DEBUG
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.moh.bdrvs.gh
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bdrvs_net
      - CORE_PEER_ADDRESS=peer0.moh.bdrvs.gh:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.moh.bdrvs.gh:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.moh.bdrvs.gh:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.moh.bdrvs.gh:7051
      - CORE_PEER_LOCALMSPID=MoHMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.moh.bdrvs.gh:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0moh"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    volumes:
      - ../crypto-material/peerOrganizations/moh.bdrvs.gh/peers/peer0.moh.bdrvs.gh:/etc/hyperledger/fabric
      - peer0.moh.bdrvs.gh:/var/hyperledger/production
      - ./peercfg:/etc/hyperledger/peercfg
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - 7051:7051
      - 9444:9444
    networks:
      - bdrvs_net

  # ── NITA Peer ─────────────────────────────────────────────────────────────────
  peer0.nita.bdrvs.gh:
    container_name: peer0.nita.bdrvs.gh
    image: hyperledger/fabric-peer:2.5
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.nita.bdrvs.gh
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=bdrvs_net
      - CORE_PEER_ADDRESS=peer0.nita.bdrvs.gh:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.nita.bdrvs.gh:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.nita.bdrvs.gh:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.nita.bdrvs.gh:9051
      - CORE_PEER_LOCALMSPID=NITAMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.nita.bdrvs.gh:9445
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0nita"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    volumes:
      - ../crypto-material/peerOrganizations/nita.bdrvs.gh/peers/peer0.nita.bdrvs.gh:/etc/hyperledger/fabric
      - peer0.nita.bdrvs.gh:/var/hyperledger/production
      - ./peercfg:/etc/hyperledger/peercfg
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - 9051:9051
      - 9445:9445
    networks:
      - bdrvs_net

  # ── CLI (admin shell for channel/chaincode ops) ───────────────────────────────
  cli:
    container_name: bdrvs_cli
    image: hyperledger/fabric-tools:2.5
    labels:
      service: hyperledger-fabric
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      # Default context — MoH Admin
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.moh.bdrvs.gh:7051
      - CORE_PEER_LOCALMSPID=MoHMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/moh.bdrvs.gh/peers/peer0.moh.bdrvs.gh/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/moh.bdrvs.gh/peers/peer0.moh.bdrvs.gh/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/moh.bdrvs.gh/peers/peer0.moh.bdrvs.gh/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/moh.bdrvs.gh/users/Admin@moh.bdrvs.gh/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - ../crypto-material:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ../channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../chaincode:/opt/gopath/src/github.com/chaincode
      - ./peercfg:/etc/hyperledger/peercfg
    depends_on:
      - peer0.moh.bdrvs.gh
      - peer0.nita.bdrvs.gh
    networks:
      - bdrvs_net
